name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: pwsh
        run: rustup default stable

      - name: Check formatting
        shell: pwsh
        run: cargo fmt --all -- --check

      - name: Check all targets
        shell: pwsh
        run: cargo check --all-targets

      - name: Test
        shell: pwsh
        run: cargo test

  source-package:
    name: Source Package
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create source archives
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          prefix="ripcanvas-${version}/"
          mkdir -p dist/source
          git archive --format=zip --prefix="${prefix}" HEAD -o "dist/source/ripcanvas-source-${version}.zip"
          git archive --format=tar --prefix="${prefix}" HEAD | gzip -9 > "dist/source/ripcanvas-source-${version}.tar.gz"

      - name: Upload source archives
        uses: actions/upload-artifact@v4
        with:
          name: ripcanvas-source-${{ steps.version.outputs.version }}
          path: dist/source/*
          if-no-files-found: error

  windows-package:
    name: Windows 11 ${{ matrix.arch }}
    runs-on: windows-latest
    needs: validate

    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
          - x86
          - arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: pwsh
        run: rustup default stable

      - name: Resolve package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            "version=${env:GITHUB_REF_NAME}" >> $env:GITHUB_OUTPUT
          } else {
            "version=$($env:GITHUB_SHA.Substring(0, 7))" >> $env:GITHUB_OUTPUT
          }

      - name: Build portable package
        shell: pwsh
        run: .\scripts\package-windows.ps1 -ZipOnly -Arch ${{ matrix.arch }} -Version ${{ steps.version.outputs.version }}

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: ripcanvas-windows11-${{ matrix.arch }}-${{ steps.version.outputs.version }}
          path: dist/ripcanvas-windows11-${{ matrix.arch }}-${{ steps.version.outputs.version }}.zip
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - source-package
      - windows-package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/release/* \
            --title "RipCanvas ${GITHUB_REF_NAME}" \
            --notes "Automated RipCanvas release for ${GITHUB_REF_NAME}."
